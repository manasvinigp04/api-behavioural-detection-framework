name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit & integration tests
        run: |
          python -m pytest -q

  demo:
    name: Demo validation (lightweight)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Start sample mock API
        run: |
          # Start the included mock API in background
          nohup python examples/mock_apis/users_api.py > mock_api.log 2>&1 &
          # Give server time to start
          sleep 2

      - name: Init ACV config
        run: |
          acv init

      - name: Run ACV validate (demo)
        run: |
          # Use sample spec and local mock server
          acv validate openapi/sample_users_api.yaml --api-url http://localhost:8000 --format json
